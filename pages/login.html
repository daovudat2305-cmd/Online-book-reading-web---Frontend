<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
   
    <!-- CSS -->

    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
</head>
<body>
    <div class="flex justify-center items-center min-h-screen gap-20">
        <!-- Image -->
        <div>
            <img src="../assets/logo.svg" class="w-72">
        </div>
        
        <!-- Login Form -->
        <div class="bg-primary w-[480px] h-[480px] rounded-lg flex flex-col p-8">
            <h2 class="text-2xl font-semibold text-center mb-8 text-primary-content">Đăng nhập</h2>
            <div>
                <form action="" class="flex flex-col space-y-6">
                    <div class="flex flex-col">
                        <label for="" class="mb-2 font-medium text-primary-content">Tên đăng nhập</label> 
                        <input type="text" placeholder="Nhập tên đăng nhập" class="bg-white border rounded-md p-2 w-full">
                    </div>

                    <div class="flex flex-col">
                        <label for="" class="mb-2 font-medium text-primary-content">Mật khẩu</label>
                        <input type="password" placeholder="Nhập mật khẩu" class="bg-white border rounded-md p-2 w-full">
                    </div>

                    <div class="text-right">
                        <a href="register.html" class="text-primary-content hover:underline">Đăng ký</a>
                    </div>

                    <button class="bg-background font-bold py-2 rounded-md w-full transition duration-200 hover:-translate-y-1 hover:shadow-lg">
                        Đăng nhập
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
