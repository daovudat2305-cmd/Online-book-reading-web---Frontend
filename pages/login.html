<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <!-- CSS -->

    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
    <script defer src="../js/login.js"></script>
    <script defer src="../js/toast-message.js"></script>
</head>
<body>
    <div class="flex items-center justify-center min-h-screen gap-20 bg-gradient-to-t from-p-200 to-p-50">
        <!-- Image -->
        <div>
            <img src="../assets/logo.svg" class="w-72">
        </div>
        
        <!-- Login Form -->
        <div class=" bg-gradient-to-t from-secondary-light to-p-300 w-[480px] h-[480px] rounded-lg flex flex-col p-8 shadow-xl">
            <h2 class="mb-8 text-2xl font-semibold text-center text-n-800">Đăng nhập</h2>
            <div>
                <form action="" class="flex flex-col space-y-6">
                    <div class="flex flex-col">
                        <label for="" class="mb-2 font-medium text-n-800">Tên đăng nhập</label> 
                        <input id="username" type="text" placeholder="Nhập tên đăng nhập" class="w-full p-2 bg-white border rounded-md">
                    </div>

                    <div class="relative flex flex-col">
                        <label for="" class="mb-2 font-medium text-n-800">Mật khẩu</label>
                        <input id="password" type="password" placeholder="Nhập mật khẩu" class="w-full p-2 bg-white border rounded-md">
                        
                        <!-- icon mat -->
                        <span id="togglePassword" class="absolute right-3 top-[40px] cursor-pointer select-none">
                            <i class="fa-regular fa-eye"></i>
                        </span>
                    </div>

                    <div class="text-right">
                        <span class="text-n-700">Bạn chưa có tài khoản?</span> <a href="register.html" class="font-bold text-p-700 hover:underline hover:text-n-50">Đăng ký ngay</a>
                    </div>

                    <button id="btnLogin" class="w-full py-2 font-bold transition duration-200 rounded-md bg-background hover:-translate-y-1 hover:shadow-lg hover:cursor-pointer">
                        Đăng nhập
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- toast message -->
    <div id="toast-container" class="fixed z-50 space-y-3 top-5 right-5"></div>
</body>
</html>
