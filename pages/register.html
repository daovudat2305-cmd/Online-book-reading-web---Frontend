<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
   
    <!-- CSS -->

    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
</head>
<body>
    <div class="flex items-center justify-center min-h-screen gap-20 bg-gradient-to-t from-p-200 to-white">
        <!-- Image -->
        <div>
            <img src="../assets/logo.svg" class="w-72">
        </div>
        
        <!-- Register Form -->
        <div class="bg-p-400 w-[480px] h-[540px] rounded-lg flex flex-col p-8 shadow-xl">
            <h2 class="mb-8 text-2xl font-semibold text-center text-n-800">Đăng ký</h2>
            <div>
                <form action="" class="flex flex-col space-y-6">

                    <div class="flex flex-col">
                        <label for="" class="mb-2 font-medium text-n-800">Email</label> 
                        <input type="email" placeholder="Nhập email" class="w-full p-2 bg-white border rounded-md">
                    </div>

                    <div class="flex flex-col">
                        <label for="" class="mb-2 font-medium text-n-800">Tên đăng nhập</label> 
                        <input type="text" placeholder="Nhập tên đăng nhập" class="w-full p-2 bg-white border rounded-md">
                    </div>

                    <div class="flex flex-col">
                        <label for="" class="mb-2 font-medium text-n-800">Mật khẩu</label>
                        <input type="password" placeholder="Nhập mật khẩu" class="w-full p-2 bg-white border rounded-md">
                    </div>

                    <div class="text-right">
                        <span class="text-n-700">Bạn đã có tài khoản?</span> <a href="login.html" class="font-bold text-p-700 hover:underline hover:text-n-50">Đăng nhập ngay</a>
                    </div>

                    <button class="w-full py-2 font-bold transition duration-200 rounded-md bg-background hover:-translate-y-1 hover:shadow-lg">
                        Đăng ký
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
