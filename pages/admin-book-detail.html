<!--admin xóa sách-->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link href="../dist/output.css" rel="stylesheet">
</head>
<body class="relative min-h-screen font-sans bg-gradient-to-t from-p-200 to-white text-n-800">

    <div class="w-full">
        
        <div class="flex items-center p-6 space-x-4">
            <img src="../assets/logo.png" alt="Logo Icon" class="inline-block w-12 h-12">
            <h1 class="text-3xl font-bold text-n-800">Book Online - Quản lý</h1>
        </div>

        <nav class="flex items-center font-medium text-n-800 bg-p-400">
            <a href="admin-home.html" class="block px-6 py-4 bg-p-200">
                Quản lý sách
            </a>
            <a href="admin-author.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Tác giả
            </a>
            <a href="admin-author-register.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Danh sách đăng ký tác giả
            </a>
            <a href="admin-transaction.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Quản lý giao dịch
            </a>
        </nav>

        <div class="p-6">
            
            <div class="flex items-center mb-10 space-x-3">
                <button class="px-6 py-2 font-bold transition rounded-full shadow-sm bg-n-200 hover:bg-n-500">
                    Tìm kiếm
                </button>
                <input type="text" placeholder="Bạn muốn tìm sách nào" class="bg-n-50 px-6 py-2 rounded-full w-[350px] outline-none focus:ring-2 focus:ring-p-300 placeholder-n-600 font-medium shadow-sm">
            </div>

            <div class="flex flex-col gap-10 pl-4 mt-12 md:flex-row">
                
                <div class="w-56 shrink-0">
                    <div class="w-full aspect-[2/3] bg-[#d9d9d9] shadow-sm"></div>
                </div>

                <div class="flex flex-col">
                    <h2 class="mb-4 text-xl font-bold text-n-800">Tên sách</h2>
                    
                    <div class="space-y-1 text-[15px] font-medium text-n-800 mb-8">
                        <p>Tác giả</p>
                        <p>Ngày đăng</p>
                        <p>Số trang</p>
                        <p>Lượt yêu thích</p>
                        <p>Lượt đọc</p>
                        <p>Số bình luận</p>
                        <br>
                        <p>Các thể loại</p>
                    </div>

                    <div class="flex mt-auto space-x-4">
                        <button class="px-8 py-2 font-medium transition shadow-sm bg-n-100 hover:bg-success hover:text-white text-n-800">
                            Đọc sách
                        </button>
                        <button id="btn-delete" class="px-8 py-2 font-medium transition shadow-sm bg-n-100 hover:bg-error hover:text-white text-n-800">
                            Xóa sách
                        </button>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <div id="delete-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-n-50/60">
        <div class="bg-white w-[400px] rounded-lg shadow-xl p-6">
            <h3 class="mb-4 text-xl font-bold text-n-800">Lý do xóa sách</h3>
            
            <textarea placeholder="Nhập lý do xóa cuốn sách này..." class="w-full bg-[#f3f4f6] border border-gray-300 rounded-md p-3 h-32 outline-none focus:ring-2 focus:ring-red-400 resize-none mb-6"></textarea>
            
            <div class="flex justify-end space-x-3">
                <button id="btn-cancel" class="px-5 py-2 font-medium transition bg-gray-300 rounded hover:bg-gray-400">
                    Hủy
                </button>
                <button id="btn-submit" class="px-5 py-2 font-medium text-white transition bg-red-500 rounded hover:bg-red-700">
                    Gửi
                </button>
            </div>
        </div>
    </div>

    <script>
        // Bắt lấy các phần tử HTML bằng ID
        const btnDelete = document.getElementById('btn-delete');
        const btnCancel = document.getElementById('btn-cancel');
        const deleteModal = document.getElementById('delete-modal');

        // Khi bấm nút "Xóa sách" -> Xóa class 'hidden' để hiện Modal
        btnDelete.addEventListener('click', function() {
            deleteModal.classList.remove('hidden');
        });

        // Khi bấm nút "Hủy" -> Thêm class 'hidden' để giấu Modal đi
        btnCancel.addEventListener('click', function() {
            deleteModal.classList.add('hidden');
        });

        // Tùy chọn: Khi bấm "Gửi" -> Hiện thông báo và ẩn Modal
        document.getElementById('btn-submit').addEventListener('click', function() {
            alert('Đã gửi lý do xóa sách thành công!');
            deleteModal.classList.add('hidden');
        });
    </script>
</body>
</html>
