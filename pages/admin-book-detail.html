<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sách - Admin</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">

    <!-- CSS -->
    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
    <script defer src="../js/admin.js"></script>
    <script src="../js/admin-book-detail.js"></script>
    <script src="../js/layout.js"></script>
</head>
<body class="relative min-h-screen font-sans bg-gradient-to-t from-p-200 to-white text-n-800">

    <div class="w-full">
        <div id="header-placeholder"></div>

        <nav class="flex items-center font-medium text-n-800 bg-p-400">
            <a href="admin-home.html" class="block px-6 py-4 bg-p-200">
                Quản lý sách
            </a>
            <a href="admin-author.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Tác giả
            </a>
            <a href="admin-author-register.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Danh sách đăng ký tác giả
            </a>
            <a href="admin-transaction.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Quản lý giao dịch
            </a>
            <button onclick="logout()" class="p-2 cursor-pointer text-n-50 bg-secondary-light rounded-3xl hover:bg-secondary-dark">
                Đăng xuất
            </button>
        </nav>

        <div class="p-6">
            <div class="flex items-center mb-10 space-x-3">
                <button class="px-6 py-2 font-bold transition rounded-full shadow-sm bg-n-200 hover:bg-n-500">Tìm kiếm</button>
                <input type="text" placeholder="Bạn muốn tìm sách nào" class="bg-n-50 px-6 py-2 rounded-full w-[350px] outline-none focus:ring-2 focus:ring-p-300 shadow-sm">
            </div>

            <div class="flex flex-col gap-10 pl-4 mt-12 md:flex-row">
                <div class="self-start w-56 shrink-0" id="book-cover-container">
                    <img src="..." class="object-contain w-full border border-gray-200 rounded shadow-md" id="book-cover-img">
                </div>

                <div class="flex flex-col">
                    <h2 id="book-title" class="mb-4 text-xl font-bold text-n-800">Đang tải...</h2>
                    
                <div class="space-y-1 text-[15px] font-medium text-n-800 mb-8">
                    <p id="book-author">Tác giả: ...</p>
                    <p id="book-date">Ngày đăng: ...</p>
                    <p id="book-pages">Số trang: ...</p>
                    <p id="book-view">Lượt đọc: 0</p>
                    <p id="book-favorites">Lượt yêu thích: 0</p>
                    <p id="numberOfComments">Số bình luận: 0</p>
                    <p id="book-type">Loại sách: ...</p>
                    <p>Thể loại: <span id="book-categories" class="italic font-normal text-gray-600">Đang tải...</span></p>
                </div>


                    <div class="flex mt-auto space-x-4">
                        <button id="btn-read" class="px-8 py-2 font-medium transition shadow-sm bg-n-100 hover:bg-success hover:text-white text-n-800">
                            Đọc sách
                        </button>
                        <button id="btn-delete" class="px-8 py-2 font-medium transition shadow-sm bg-n-100 hover:bg-error hover:text-white text-n-800">
                            Xóa sách
                        </button>
                    </div>

                </div>
            </div>

            <div class="pb-20 pl-4 mt-16">
                <h3 class="mb-6 text-xl font-bold text-n-800">Giới thiệu nội dung</h3>
                <div id="book-description" class="max-w-4xl italic leading-relaxed text-n-700">
                    Đang tải nội dung giới thiệu...
                </div>
            </div>

        </div>
    </div>


    <div id="delete-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/50">
        <div class="bg-white w-[400px] rounded-lg shadow-xl p-6">
            <h3 class="mb-4 text-xl font-bold text-n-800">Lý do xóa sách</h3>
            <textarea id="delete-reason" placeholder="Nhập lý do xóa cuốn sách này..." class="w-full bg-[#f3f4f6] border border-gray-300 rounded-md p-3 h-32 outline-none focus:ring-2 focus:ring-red-400 resize-none mb-6"></textarea>
            
            <div class="flex justify-end space-x-3">
                <button id="btn-cancel" class="px-5 py-2 font-medium transition bg-gray-300 rounded hover:bg-gray-400">Hủy</button>
                <button id="btn-submit" class="px-5 py-2 font-medium text-white transition bg-red-500 rounded hover:bg-red-700">Gửi & Xóa</button>
            </div>
        </div>
    </div>

    <div id="read-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4 bg-black/80">
        <div class="relative w-11/12 max-w-7xl h-[95vh] bg-white rounded-xl shadow-2xl flex flex-col overflow-hidden">
            
            <div class="flex items-center justify-between px-6 py-4 border-b bg-blue-50">
                <h3 class="text-xl font-bold text-blue-900" id="read-modal-title">Đọc sách</h3>
                <button id="btn-close-read" class="text-3xl font-bold leading-none text-red-500 hover:text-red-700 focus:outline-none">&times;</button>
            </div>
            
            <div class="flex-1 w-full bg-gray-200">
                <iframe id="pdf-frame" class="w-full h-full border-none" src=""></iframe>
            </div>
            
        </div>
    </div>

</body>
</html>
