<!--Thông tin cá nhân tác giả-->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
   
    <!-- CSS -->

    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
</head>
<body class="bg-white min-h-screen font-sans text-gray-800 relative">

    <div class="w-full bg-white relative">
        
        <div class="p-6 flex items-center space-x-4">
            <h1 class="text-3xl font-bold text-black">Logo</h1>
            <img src="../assets/logo.png" alt="Logo Icon" class="w-12 h-12 inline-block">
        </div>

        <nav class="bg-[#00c6d7] flex items-center text-black font-medium">
            <a href="admin-home.html" class="px-6 py-4 hover:bg-[#40dbe5] transition duration-300 block">
                Quản lý sách
            </a>
            <a href="admin-author.html" class="bg-[#40dbe5] px-6 py-4 block">
                Tác giả
            </a>
            <a href="admin-author-register.html" class="px-6 py-4 hover:bg-[#40dbe5] transition duration-300 block">
                Danh sách đăng ký tác giả
            </a>
            <a href="admin-transaction.html" class="px-6 py-4 hover:bg-[#40dbe5] transition duration-300 block">
                Quản lý giao dịch
            </a>
        </nav>

        <div class="p-6 relative">
            
            <div class="flex items-center space-x-3 mb-10 pl-2">
                <button class="bg-[#d1d5db] px-6 py-2 rounded-full font-bold shadow-sm hover:bg-gray-400 transition">
                    Tìm kiếm
                </button>
                <input type="text" placeholder="Bạn muốn tìm tác giả của sách nào" class="bg-[#d1d5db] px-6 py-2 rounded-full w-[350px] outline-none focus:ring-2 focus:ring-[#00c6d7] placeholder-gray-600 font-medium shadow-sm">
            </div>

            <div class="bg-[#fcf4f4] w-full max-w-5xl mx-4 mt-8 p-12 flex flex-col md:flex-row gap-16 rounded-sm">
                
                <div class="flex flex-col items-center shrink-0">
                    <div class="w-28 h-28 rounded-full bg-[#d1d5db] border border-gray-300 mb-4 overflow-hidden">
                        </div>
                    <span class="text-[15px] font-medium text-gray-700">Ảnh đại diện</span>
                </div>

                <div class="flex flex-col w-full">
                    <p class="text-lg font-medium text-black mb-8">Thông tin cá nhân tác giả</p>
                    
                    <div class="space-y-4 text-[16px] text-black">
                        
                        <div class="grid grid-cols-[200px_auto] items-center">
                            <p>Tên đăng nhập:</p>
                            <p class="font-medium"></p> 
                        </div>
                        
                        <div class="grid grid-cols-[200px_auto] items-center">
                            <p>Họ và tên:</p>
                            <p class="font-medium"></p>
                        </div>
                        
                        <div class="grid grid-cols-[200px_auto] items-center">
                            <p>Email:</p>
                            <p class="font-medium"></p>
                        </div>
                        
                        <div class="grid grid-cols-[200px_auto] items-center">
                            <p>Ngày sinh:</p>
                            <p class="font-medium"></p>
                        </div>
                        
                        <div class="grid grid-cols-[200px_auto] items-center">
                            <p>Giới tính:</p>
                            <p class="font-medium"></p>
                        </div>
                        
                        <div class="grid grid-cols-[200px_auto] items-center">
                            <p>STK ngân hàng:</p>
                            <p class="font-medium"></p>
                        </div>
                        
                        <div class="grid grid-cols-[200px_auto] items-center">
                            <p>SĐT:</p>
                            <p class="font-medium"></p>
                        </div>

                        <div class="grid grid-cols-[200px_auto] items-center pt-2">
                            <p>Danh sách sách đã đăng:</p>
                            <a href="#" class="text-blue-600 hover:underline font-medium">Xem chi tiết</a>
                        </div>

                    </div>
                </div>

            </div>

        </div>
    </div>

</body>
</html>
