<!--Danh sách đăng ký tác giả-->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
   
    <!-- CSS -->

    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
    <script defer src="../js/admin.js"></script>
    <script src="../js/admin-review-author.js"></script>
</head>
<body class="relative min-h-screen font-sans bg-gradient-to-t from-p-200 to-white text-n-800">

    <div class="relative w-full">
        
        <div class="flex items-center p-6 space-x-4">
            <img src="../assets/logo.png" alt="Logo Icon" class="inline-block w-12 h-12">
            <h1 class="text-3xl font-bold text-n-800">Book Online - Quản lý</h1>
        </div>

        <nav class="flex items-center font-medium bg-p-400 text-n-800">
            <a href="admin-home.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Quản lý sách
            </a>
            <a href="admin-author.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Tác giả
            </a>
            <a href="admin-author-register.html" class="block px-6 py-4 bg-p-200">
                Danh sách đăng ký tác giả
            </a>
            <a href="admin-transaction.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Quản lý giao dịch
            </a>
            <button onclick="logout()" class="p-2 cursor-pointer text-n-50 bg-secondary-light rounded-3xl hover:bg-secondary-dark">
                Đăng xuất
            </button>
        </nav>

        <div id="list-view">
            <div class="relative p-6">
                
                <div class="flex items-center pl-2 mb-10 space-x-3">
                    <button class="px-6 py-2 font-bold transition rounded-full shadow-sm bg-n-200 hover:bg-n-500">
                        Tìm kiếm
                    </button>
                    <input type="text" placeholder="Bạn muốn tìm tác giả của sách nào" class="bg-n-50 px-6 py-2 rounded-full w-[350px] outline-none focus:ring-2 focus:ring-p-300 placeholder-n-600 font-medium shadow-sm">
                </div>
    
                <!-- danh sách đơn -->
                <div id="author-request-list" class="grid grid-cols-2 px-6 mt-16 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-10 gap-y-12">
    
                </div>
    
            </div>
            <div id="pagination-container" class="flex justify-center mt-8 space-x-2">
                
            </div>
        </div>

        <!-- thông tin chi tiết -->
        <div id="detail-view" class="hidden">
            <div class="relative p-6 ">
                
                <!-- Nút quay lại -->
                <a href="admin-author.html" class="flex items-center gap-2 text-md ml-3 text-n-700 hover:text-n-800 hover:cursor-pointer">
                    <i class="fa-solid fa-chevron-left"></i>
                    Trở lại
                </a>
    
                <div class="flex flex-col w-full max-w-5xl gap-16 p-12 mx-4 mt-8 rounded-sm bg-n-50 md:flex-row">
                    
                    <div class="flex flex-col items-center shrink-0">
                        <div class="w-28 h-28 rounded-full bg-[#d1d5db] border border-gray-300 mb-4 overflow-hidden">
                            <img id="detail-avatar" src="" alt="Avatar">    
                        </div>
                        <span class="text-[15px] font-medium text-n-700">Ảnh đại diện</span>
                    </div>
    
                    <div class="flex flex-col w-full">
                        <p class="mb-8 text-lg font-medium text-n-800">Thông tin đơn đăng ký tác giả</p>
                        
                        <div class="space-y-4 text-[16px] text-n-800 mb-10">
                            
                            <div class="grid grid-cols-[140px_auto] items-center">
                                <p>Tên đăng nhập:</p>
                                <p id="detail-username" class="font-medium"></p> </div>
                            
                            <div class="grid grid-cols-[140px_auto] items-center">
                                <p>Họ và tên:</p>
                                <p id="detail-fullName" class="font-medium"></p>
                            </div>
                            
                            <div class="grid grid-cols-[140px_auto] items-center">
                                <p>Email:</p>
                                <p id="detail-email" class="font-medium"></p>
                            </div>
                            
                            <div class="grid grid-cols-[140px_auto] items-center">
                                <p>Ngày sinh:</p>
                                <p id="detail-dob" class="font-medium"></p>
                            </div>
                            
                            <div class="grid grid-cols-[140px_auto] items-center">
                                <p>Giới tính:</p>
                                <p id="detail-gender" class="font-medium"></p>
                            </div>
                            
                            <div class="grid grid-cols-[140px_auto] items-center">
                                <p>STK ngân hàng:</p>
                                <p id="detail-stk" class="font-medium"></p>
                            </div>
                            
                            <div class="grid grid-cols-[140px_auto]">
                                <p>Lý do nộp đơn:</p>
                                <p id="detail-description" class="font-medium"></p>
                            </div>
    
                            <div class="grid grid-cols-[140px_auto] items-center">
                                <p>Ngày nộp đơn:</p>
                                <p id="detail-createdAt" class="font-medium"></p>
                            </div>
    
                        </div>
    
                        <div class="flex items-center space-x-6">
                            <button id="acceptBtn" class="px-8 py-2 font-medium transition shadow-sm cursor-pointer bg-n-100 hover:bg-success hover:text-white text-n-800">
                                Đồng ý
                            </button>
                            <button id="rejectBtn" class="px-8 py-2 font-medium transition shadow-sm cursor-pointer bg-n-100 hover:bg-error hover:text-white text-n-800">
                                Từ chối
                            </button>
                        </div>
    
                    </div>
    
                </div>
    
            </div>
        </div>
    </div>

</body>
</html>
