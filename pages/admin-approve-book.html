<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyệt sách - Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
    <script defer src="../js/admin.js"></script>
</head>
<body class="min-h-screen font-sans text-n-800">

    <div class="w-full bg-gradient-to-t from-p-200 to-white">
        <div class="flex items-center p-6 space-x-4">
            <img src="../assets/logo.png" alt="Logo Icon" class="inline-block w-12 h-12">
            <h1 class="text-3xl font-bold text-n-800">Book Online - Quản lý</h1>
        </div>

        <nav class="flex items-center font-medium bg-p-400 text-n-800">
            <a href="admin-home.html" class="block px-6 py-4 bg-p-200">
                Quản lý sách
            </a>
            <a href="admin-author.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Tác giả
            </a>
            <a href="admin-author-register.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Danh sách đăng ký tác giả
            </a>
            <a href="admin-transaction.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Quản lý giao dịch
            </a>
            <button onclick="logout()" class="p-2 cursor-pointer text-n-50 bg-secondary-light rounded-3xl hover:bg-secondary-dark">
                Đăng xuất
            </button>
        </nav>

        <div class="p-6 mt-4">
            <div class="flex flex-col gap-16 pl-8 md:flex-row">
                <div class="w-[200px] shrink-0" id="book-cover-container">
                    <div class="w-full aspect-[2/3] bg-[#d9d9d9] shadow-sm animate-pulse"></div>
                </div>

                <div class="flex flex-col pt-2">
                    <h2 id="book-title" class="mb-10 text-2xl font-bold text-n-800 italic">Đang tải...</h2>
                    
                    <div class="space-y-1 text-[16px] font-medium text-n-800 mb-12">
                        <p id="book-author">Tác giả: ...</p>
                        <p id="book-pages">Số trang: ...</p>
                        <p id="book-type">Loại sách: ...</p>
                        <p id="book-categories">Thể loại: ...</p>
                    </div>

                    <div class="flex items-center space-x-4">
                        <button id="btn-read" class="px-6 py-2 font-medium transition shadow-sm bg-n-50 hover:bg-n-500 hover:text-white text-n-800">
                            Đọc thử PDF
                        </button>
                        <button id="btn-approve" class="px-6 py-2 font-medium transition shadow-sm bg-n-50 hover:bg-green-500 hover:text-white text-n-800">
                            Đồng ý duyệt
                        </button>
                        <button id="btn-reject" class="px-6 py-2 font-medium transition shadow-sm bg-n-50 hover:bg-red-500 hover:text-white text-n-800">
                            Từ chối
                        </button>
                    </div>
                </div>
            </div>

            <div class="pb-20 pl-8 mt-20">
                <h3 class="mb-6 text-xl font-bold text-n-800">Giới thiệu nội dung</h3>
                <div id="book-description" class="max-w-4xl leading-relaxed text-n-700 italic">
                    Đang tải nội dung giới thiệu...
                </div>
            </div>
        </div>
    </div>

    <div id="read-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/80 p-4">
        <div class="relative w-11/12 max-w-7xl h-[95vh] bg-white rounded-xl shadow-2xl flex flex-col overflow-hidden">
            <div class="flex justify-between items-center px-6 py-4 border-b bg-blue-50">
                <h3 class="text-xl font-bold text-blue-900" id="read-modal-title">Đọc thử PDF</h3>
                <button id="btn-close-read" class="text-red-500 hover:text-red-700 font-bold text-3xl leading-none focus:outline-none">&times;</button>
            </div>
            <div class="flex-1 w-full bg-gray-200">
                <iframe id="pdf-frame" class="w-full h-full border-none" src=""></iframe>
            </div>
        </div>
    </div>

    <script src="../js/admin-approve-book.js"></script>
</body>
</html>
