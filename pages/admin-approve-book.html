<!-- Duyệt sách-->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
   
    <!-- CSS -->

    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
    <script defer src="../js/admin.js"></script>
</head>
<body class="min-h-screen font-sans text-n-800">

    <div class="w-full bg-gradient-to-t from-p-200 to-white">
        
        <div class="flex items-center p-6 space-x-4">
            <img src="../assets/logo.png" alt="Logo Icon" class="inline-block w-12 h-12">
            <h1 class="text-3xl font-bold text-n-800">Book Online - Quản lý</h1>
        </div>

        <nav class="flex items-center font-medium bg-p-400 text-n-800">
            <a href="admin-home.html" class="block px-6 py-4 bg-p-200">
                Quản lý sách
            </a>
            <a href="admin-author.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Tác giả
            </a>
            <a href="admin-author-register.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Danh sách đăng ký tác giả
            </a>
            <a href="admin-transaction.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Quản lý giao dịch
            </a>
            <button onclick="logout()" class="p-2 cursor-pointer text-n-50 bg-secondary-light rounded-3xl hover:bg-secondary-dark">
                Đăng xuất
            </button>
        </nav>

        <div class="p-6 mt-4">
            
            <div class="flex items-center pl-4 mb-16 space-x-3">
                <button class="px-6 py-2 font-bold transition rounded-full shadow-sm bg-n-200 hover:bg-n-500 hover:cursor-pointer">
                    Tìm kiếm
                </button>
                <input type="text" placeholder="Bạn muốn tìm sách gì" class="bg-n-50 px-6 py-2 rounded-full w-[300px] outline-none focus:ring-2 focus:ring-p-300 placeholder-n-600 font-medium shadow-sm">
            </div>

            <div class="flex flex-col gap-16 pl-8 md:flex-row">
                
                <div class="w-[200px] shrink-0">
                    <div class="w-full aspect-[2/3] bg-[#d9d9d9] shadow-sm"></div>
                </div>

                <div class="flex flex-col pt-2">
                    <h2 class="mb-10 text-2xl font-bold text-n-800">Tên sách</h2>
                    
                    <div class="space-y-1 text-[16px] font-medium text-n-800 mb-12">
                        <p>Tác giả</p>
                        <p>Số trang</p>
                        <p>Các thể loại</p>
                    </div>

                    <div class="flex items-center space-x-4">
                        <button class="px-6 py-2 font-medium transition shadow-sm bg-n-50 hover:bg-n-500 hover:text-white text-n-800">
                            Đọc ngay
                        </button>
                        <button class="px-6 py-2 font-medium transition shadow-sm bg-n-50 hover:bg-success hover:text-white text-n-800">
                            Đồng ý
                        </button>
                        <button class="px-6 py-2 font-medium transition shadow-sm bg-n-50 hover:bg-error hover:text-white text-n-800">
                            Từ chối
                        </button>
                    </div>
                </div>
            </div>

            <div class="pb-20 pl-8 mt-20">
                <h3 class="mb-6 text-xl font-bold text-n-800">Giới thiệu nội dung</h3>
                <div class="max-w-4xl leading-relaxed text-n-700">
                    </div>
            </div>

        </div>
    </div>

</body>
</html>
