<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <!-- CSS -->

    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
    <script defer src="../js/home.js"></script>
    <script defer src="../js/main.js"></script>

</head>
<body class="bg-gradient-to-t from-p-100 to-p-50">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="fixed flex flex-col items-center p-2 m-auto ml-4 -translate-y-1/2 shadow-md w-fit h-fit bg-p-300 rounded-2xl top-1/2 left-4">
            <div class="mt-6 mb-6">
                <img src="../assets/logo.png" class="w-10 h-10 rounded-full">
            </div>

            <nav class="flex flex-col gap-6">
                
                <a href="home.html" href="home.html" onclick="event.preventDefault(); goTo('home.html')" class="home-btn home-btn-active">
                    <i class="text-center fa-solid fa-house"></i>
                    <span class="font-medium home-label">Trang chủ</span>
                </a>
                
                <a href="home-category.html" class="home-btn">
                    <i class="fa-solid fa-layer-group"></i>
                    <span class="font-medium home-label">Thể loại</span>
                </a>

                <a href="home-rank.html" class="home-btn">
                    <i class="fa-solid fa-ranking-star"></i>
                    <span class="font-medium home-label">Xếp hạng</span>
                </a>

                <a href="home-history.html" class="home-btn">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span class="font-medium home-label">Lịch sử đọc</span>
                </a>
            </nav>
        </aside>

        <div class="flex flex-col w-full">
            <!-- Main -->
            <main class="flex-1 p-6 ml-64"> <div class="sticky z-50 flex items-center justify-around mb-8 top-4">
                    <div class="w-1/2">
                        <input id="search-input" placeholder="Tìm kiếm sách" class="w-full px-4 py-2 bg-white border rounded-full shadow-md outline-none border-secondary-light">
                    </div>

                    <div id="guest-menu">
                        <button onclick="window.location.href='login.html'" class="p-2 btn">Đăng nhập</button>
                        <button onclick="window.location.href='register.html'" class="p-2 btn">Đăng ký</button>
                    </div>

                    <div id="user-menu" class="relative"> <div id="avatarBtn" class="flex items-center gap-2 hover:cursor-pointer">
                            <img id="avatarPreview" src="../assets/logo.png" class="w-10 h-10 rounded-full">
                            <span id="display-username" class="text-sm font-semibold"></span>
                        </div>

                        <div id="avatarMenu" class="absolute right-0 hidden w-40 mt-2 rounded-lg shadow-lg bg-white top-12 border">
                            <a id="profileBtn" href="profile.html" class="block px-4 py-2 hover:bg-gray-100">Tài khoản</a>
                            <button onclick="logout()" class="w-full px-4 py-2 text-left hover:bg-gray-100">Đăng xuất</button>
                        </div>
                    </div>
                </div>

                <div id="book-grid" class="grid grid-cols-4 gap-8">
                    </div>

            </main>
            
            <!-- Footer -->
            <footer class="mt-16 text-n-800 bg-p-200">
                <div class="flex justify-around gap-8 px-10 py-10">

                    <!-- Cột 1: Logo + mô tả -->
                    <div>
                        <h2 class="mb-3 text-xl font-bold">Book Online</h2>
                        <p class="text-sm text-n-700">
                            Nền tảng đọc sách online miễn phí và VIP. 
                            Đọc mọi lúc, mọi nơi.
                        </p>
                    </div>

                    <!-- Cột 2: Liên hệ -->
                    <div>
                        <h3 class="mb-3 font-semibold">Liên hệ</h3>
                        <p class="text-sm text-n-700">Email: support@book.com</p>
                        <p class="text-sm text-n-700">Hotline: 0123 456 789</p>

                        <!-- Social -->
                        <div class="flex gap-4 mt-3 text-lg">
                            <i class="cursor-pointer fa-brands fa-facebook hover:text-blue-500"></i>
                            <i class="cursor-pointer fa-brands fa-youtube hover:text-red-500"></i>
                            <i class="cursor-pointer fa-brands fa-github hover:text-white"></i>
                        </div>
                    </div>
                </div>

                <!-- Copyright -->
                <div class="py-4 text-sm text-center text-gray-500 border-t border-gray-700">
                    © 2026 Book Online. All rights reserved.
                </div>
            </footer>
        </div>

    </div>

    <!-- toast message -->
    <div id="toast-container" class="fixed z-50 space-y-3 top-5 right-5"></div>
</body>
</html>
