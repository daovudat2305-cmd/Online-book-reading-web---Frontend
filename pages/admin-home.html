<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Online</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
   
    <!-- CSS -->

    <link href="../dist/output.css" rel="stylesheet">

    <!-- Script -->
</head>
<body class="min-h-screen font-sans text-n-800 bg-gradient-to-t from-p-200 to-white">

    <div class="w-full">
        
        <div id="header-placeholder"></div>

        <nav class="flex items-center font-medium bg-p-400 text-n-800">
            <a href="admin-home.html" class="block px-6 py-4 bg-p-200">
                Quản lý sách
            </a>
            <a href="admin-author.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Tác giả
            </a>
            <a href="admin-author-register.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Danh sách đăng ký tác giả
            </a>
            <a href="admin-transaction.html" class="block px-6 py-4 transition duration-300 hover:bg-p-200">
                Quản lý giao dịch
            </a>
        </nav>

        <div class="p-6">
            
            <div class="flex items-center mb-10 space-x-3">
                <button id="btn-search" class="px-6 py-2 font-bold transition rounded-full shadow-sm bg-n-200 hover:bg-n-500">
                    Tìm kiếm
                </button>
                <input type="text" placeholder="Bạn muốn tìm sách nào" class="bg-n-50 px-6 py-2 rounded-full w-[350px] outline-none focus:ring-2 focus:ring-p-300 placeholder-n-600 font-medium shadow-sm">
            </div>

            <div class="relative p-6 mt-4 mb-12 border shadow-inner border-n-600 bg-n-100">
                <span class="absolute px-3 py-1 text-xl font-bold border border-n-50 bg-n-50 -top-4 left-4">Thể loại</span>
                <div class="grid grid-cols-2 mt-4 md:grid-cols-4 lg:grid-cols-7 gap-y-6 gap-x-4">
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Tiên hiệp</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Kiếm hiệp</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Hành động</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Ngôn tình</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Trinh thám</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Kinh dị</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Linh dị</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Viễn tưởng</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Học đường</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Hài hước</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">lịch sử</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Thể thao</span>
                    </label>
                </div>
            </div>

            <div class="relative p-6 mt-8 mb-12 border shadow-inner border-n-600 bg-n-100">
                <span class="absolute px-3 py-1 text-xl font-bold border border-n-50 bg-n-50 -top-4 left-4">Sắp xếp</span>
                <div class="grid max-w-2xl grid-cols-3 gap-6 mt-4">
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Lượt xem</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" class="custom-checkbox">
                        <span class="text-sm font-bold">Ngày cập nhật</span>
                    </label>
                    <label class="flex flex-col items-center space-y-2 cursor-pointer hover:opacity-80">
                        <input type="checkbox" id="filter-pending" class="custom-checkbox">
                        <span class="text-sm font-bold">Danh sách sách chờ duyệt đăng</span>
                    </label>
                </div>
            </div>

            <div id="empty-state" class="flex justify-center pt-4 pb-12">
                <div class="px-8 py-3 font-bold rounded-full shadow-sm bg-n-50">
                    Khu vực hiển thị kết quả
                </div>
            </div>

            <div id="search-results" class="hidden pb-12 mt-10">
                <div id="book-grid-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-x-6 gap-y-10">
                    
                    <a href="admin-book-detail.html" class="flex flex-col items-center block cursor-pointer book-approved group">
                        <div class="w-full aspect-[2/3] bg-[#d9d9d9] group-hover:shadow-lg transition duration-300"></div>
                        <span class="mt-3 text-sm font-medium text-n-800 group-hover:text-[#00c6d7] transition text-center">
                            Tên sách (Đã duyệt)
                        </span>
                    </a>

                    <a href="admin-approve-book.html" class="relative flex flex-col items-center hidden block cursor-pointer book-pending group">
                        <span class="absolute px-2 py-1 text-xs font-bold bg-yellow-400 rounded top-2 right-2">Chờ duyệt</span>
                        <div class="w-full aspect-[2/3] bg-[#d9d9d9] group-hover:shadow-lg transition duration-300"></div>
                        <span class="mt-3 text-sm font-medium text-n-800 group-hover:text-[#00c6d7] transition text-center">
                            Tên sách (Chờ duyệt)
                        </span>
                    </a>

                    <a href="admin-book-detail.html" class="flex flex-col items-center block cursor-pointer book-approved group">
                        <div class="w-full aspect-[2/3] bg-[#d9d9d9] group-hover:shadow-lg transition duration-300"></div>
                        <span class="mt-3 text-sm font-medium text-n-800 group-hover:text-[#00c6d7] transition text-center">
                            Tên sách (Đã duyệt)
                        </span>
                    </a>

                </div>
            </div>
            
            <div class="flex justify-center mt-8 space-x-2">
                <button class="px-4 py-2 font-medium border border-gray-300 bg-n-100 hover:bg-n-200">Trước</button>
                <button class="px-4 py-2 font-bold text-white bg-p-400">1</button>
                <button class="px-4 py-2 font-medium border border-gray-200 bg-n-100 hover:bg-n-200">2</button>
                <button class="px-4 py-2 font-medium border border-gray-200 bg-n-100 hover:bg-n-200">3</button>
                <button class="px-4 py-2 font-medium border border-gray-200 bg-n-100 hover:bg-n-200">Sau</button>
            </div>

        </div>
    </div>

    <script src="../js/admin-home.js"></script>
    <script src="../js/layout.js"></script>
    
</body>
</html>
